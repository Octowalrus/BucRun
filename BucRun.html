<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BucRun</title>
    <link rel="stylesheet" href="Scripts/style.css" />
  </head>
  <!-- The body of the HTML document contains the structure of the game interface -->
  <body>
    <header class="top-bar">
      <!-- <img src="Assets/logo.png" alt="Logo" class="logo"> Later can be added for a logo -->
      <h1 class="game-title">BucRun</h1>
    </header>

    <!-- Game scene -->
    <div class="body-container">
      <div class="game-container">
        <div class="score-bar">
          <span id="score">Score: 0</span>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <!-- The canvas element is where the game will be rendered -->
        <script type="text/javascript" src="Scripts/BucRun.js"></script>
      </div>
    </div>
  </body>
</html>
